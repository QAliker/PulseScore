name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pulsescore
          POSTGRES_PASSWORD: pulsescore
          POSTGRES_DB: pulsescore
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Clean sub-workspace artifacts
        run: rm -rf apps/api/node_modules apps/api/package-lock.json apps/web/node_modules apps/web/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run -w apps/api prisma:generate
        env:
          DATABASE_URL: postgresql://pulsescore:pulsescore@localhost:5432/pulsescore

      - name: Run Prisma migrations
        run: npm run -w apps/api prisma:migrate:deploy
        env:
          DATABASE_URL: postgresql://pulsescore:pulsescore@localhost:5432/pulsescore

      - name: Lint API
        run: npm run -w apps/api lint

      - name: Lint Web
        run: npm run -w apps/web lint

      - name: Build API
        run: npm run -w apps/api build

      - name: Build Web
        working-directory: apps/web
        run: npm run build:webpack

      - name: Test API
        run: npm run -w apps/api test
        env:
          DATABASE_URL: postgresql://pulsescore:pulsescore@localhost:5432/pulsescore
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
